<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crear nueva publicación en el CMS">
    <meta name="robots" content="noindex, nofollow">
    <title>Nueva Publicación - Panel CMS</title>
    <link rel="icon" type="image/png" href="../assets/img/blog.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

    <nav class="navbar">
        <div class="container navbar__inner">
            <a href="admin_listado.html" class="navbar__brand">
                <img src="../assets/img/blog.png" alt="Logo del blog">
                <span>Panel CMS</span>
            </a>
            <div class="navbar__actions">
                <a href="index.html" class="navbar__link">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Salir</span>
                </a>
            </div>
        </div>
    </nav>

    <main id="main-content" class="admin-page">
        <div class="container">
            <nav class="breadcrumb">
                <a href="admin_listado.html"><i class="bi bi-house"></i> Panel</a>
                <span>/</span>
                <span>Nueva Publicación</span>
            </nav>

            <form action="new-post.php" method="post" enctype="multipart/form-data" class="admin-form">
                <h2 class="admin-form__title">
                    <i class="bi bi-plus-circle"></i>
                    Nueva Publicación
                </h2>

                <div class="admin-form__group">
                    <label for="title" class="admin-form__label">
                        <i class="bi bi-card-text"></i>
                        Título <span class="admin-form__required">*</span>
                    </label>
                    <input type="text" id="title" name="title" class="form-control" placeholder="Escribe un título atractivo" required>
                </div>

                <div class="admin-form__group">
                    <label for="excerpt" class="admin-form__label">
                        <i class="bi bi-text-left"></i>
                        Resumen
                    </label>
                    <textarea id="excerpt" name="excerpt" class="form-control" rows="3" placeholder="Breve resumen de la publicación"></textarea>
                </div>

                <div class="admin-form__group">
                    <label for="content" class="admin-form__label">
                        <i class="bi bi-body-text"></i>
                        Contenido
                    </label>
                    <textarea id="content" name="content" class="form-control" rows="6" placeholder="Contenido completo de la publicación"></textarea>
                </div>

                <div class="admin-form__group">
                    <label for="imagen" class="admin-form__label">
                        <i class="bi bi-image"></i>
                        Imagen <span class="admin-form__required">*</span>
                    </label>
                    <input type="file" id="imagen" name="imagen" class="form-control" accept="image/*" required>
                    <p class="admin-form__hint">Formatos: JPG, PNG, WebP. Tamaño máximo: 5MB</p>
                </div>

                <div class="admin-form__actions">
                    <button type="submit" class="btn btn--primary">
                        <i class="bi bi-check-circle"></i>
                        Guardar Publicación
                    </button>
                    <a href="admin_listado.html" class="btn btn--secondary">
                        <i class="bi bi-x-circle"></i>
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__bottom">
                <p>&copy; 2026 Blog CMS - Panel de Administración</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
